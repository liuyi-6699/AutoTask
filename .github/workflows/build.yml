name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Create debug keystore
        run: keytool -genkey -v -keystore /tmp/debug.keystore -storepass android -alias debug -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
      - name: Create local.properties
        run: |
          echo "storeFile=/tmp/debug.keystore" > local.properties
          echo "storePassword=android" >> local.properties
          echo "keyAlias=debug" >> local.properties
          echo "keyPassword=android" >> local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoTask-v2.0.0-debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/*.apk
